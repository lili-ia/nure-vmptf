<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote of the Day</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 1rem;
      text-align: center;
      color: #333;
    }

    .quote-card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 1rem;
    }

    #quote-text {
      font-size: 1.2rem;
      font-style: italic;
    }

    #quote-author {
      margin-top: 1rem;
      color: #555;
    }

    #quote-category {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #888;
    }

    #new-quote-btn {
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
    }

    #new-quote-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quote of the Day</h1>
    <div class="quote-card">
      <p id="quote-text">Loading quote...</p>
      <p id="quote-author"></p>
      <span id="quote-category"></span>
    </div>
    <button id="new-quote-btn" onclick="loadQuote()">New Quote</button>
  </div>

  <script src="level1_script.js"></script>
</body>
</html>
