<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ibanez Guitar Stats</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 1rem;
      color: #333;
    }

    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
    h2 { margin: 2rem 0 0.75rem; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 0.5rem 0.75rem;
      text-align: left;
    }

    th { background: #f0f0f0; }
    tr:nth-child(even) td { background: #fafafa; }

    .chart-title {
      font-size: 0.85rem;
      color: #666;
      margin: 0 0 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .bar-label {
      width: 85px;
      font-size: 0.88rem;
    }

    .bar-track {
      flex: 1;
      background: #e0e0e0;
      border-radius: 4px;
      height: 22px;
    }

    .bar-fill {
      height: 100%;
      background: #c0392b;
      border-radius: 4px;
    }

    .bar-value {
      width: 65px;
      font-size: 0.85rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Ibanez Guitar Stats</h1>
  <p class="subtitle">Sales and ratings across popular models</p>

  <h2>Data Table</h2>
  <div id="table-container"></div>

  <h2>Charts</h2>
  <div id="sales-chart"></div>
  <div id="rating-chart"></div>

  <script src="level2_script.js"></script>
</body>
</html>
