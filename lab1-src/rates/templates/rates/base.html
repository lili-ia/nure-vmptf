<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс валют</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .table th { background-color: #0d6efd; color: white; }
        .card { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .snapshot-date { font-weight: 600; color: #0d6efd; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'index' %}">💱 Курс валют</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link {% block nav_today %}{% endblock %}" href="{% url 'index' %}">Поточний день</a>
            <a class="nav-link {% block nav_snapshots %}{% endblock %}" href="{% url 'snapshots' %}">Збережені снапшоти</a>
            <a class="nav-link" href="/admin/" target="_blank">Адмін-панель</a>
        </div>
    </div>
</nav>

<div class="container">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
